<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オリジナル対戦ボードゲーム</title>
<style>
body {
font-family: sans-serif;
display: flex;
flex-direction: column;
align-items: center;
background-color: #f0f2f5;
margin: 0;
padding: 10px;
touch-action: manipulation;
}
h1 {
font-size: 1.4rem;
margin: 10px 0;
color: #333;
}
#status {
font-size: 1rem;
font-weight: bold;
margin-bottom: 10px;
padding: 8px 16px;
border-radius: 8px;
background: #fff;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.canvas-container {
width: 100%;
max-width: 800px;
display: flex;
justify-content: center;
}
canvas {
background: #1e1e24;
border-radius: 12px;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
width: 100%;
height: auto;
touch-action: none;
}
button {
margin-top: 15px;
padding: 12px 24px;
font-size: 1rem;
background-color: #4f46e5;
color: white;
border: none;
border-radius: 6px;
cursor: pointer;
}
button:hover { background-color: #4338ca; }
</style>
</head>
<body>

<h1>アブストラクト・ボードゲーム</h1>
<div id="status">プレイヤー1（赤）の番です</div>
<div class="canvas-container">
<canvas id="gameCanvas" width="800" height="500"></canvas>
</div>
<button onclick="resetGame()">リセット</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

// 新しい画像に基づく8つの頂点（ノード）座標
const nodes = [
// 左側縦ライン (0:上, 1:中央交差点, 2:下) -> P1スタート / P2ゴール
{ id: 0, x: 200, y: 100 },
{ id: 1, x: 200, y: 250 },
{ id: 2, x: 200, y: 400 },

// 中央部分 (3:中央左-上分岐, 4:上分岐先, 5:中央右-下分岐, 6:下分岐先)
{ id: 3, x: 350, y: 250 },
{ id: 4, x: 350, y: 100 },
{ id: 5, x: 450, y: 250 },
{ id: 6, x: 450, y: 400 },

// 右側縦ライン (7:中央交差点, 8:上, 9:下) -> P2スタート / P1ゴール
{ id: 7, x: 600, y: 250 },
{ id: 8, x: 600, y: 100 },
{ id: 9, x: 600, y: 400 }
];

// 新しい線（つなぎ目）の定義
const edges = [
// 左の縦ライン
[0, 1], [1, 2],
// 中央の横ライン
[1, 3], [3, 5], [5, 7],
// 中央の上枝・下枝
[3, 4], [5, 6],
// 右の縦ライン
[8, 7], [7, 9]
];

let pieces = {};
let currentPlayer = 'P1';
let selectedNode = null;
let gameOver = false;

function initGame() {
pieces = {
0: 'P1', 1: 'P1', 2: 'P1', // 左端にP1（赤）
8: 'P2', 7: 'P2', 9: 'P2' // 右端にP2（青）
};
currentPlayer = 'P1';
selectedNode = null;
gameOver = false;
updateStatus();
draw();
}

function updateStatus() {
if (gameOver) return;
const name = currentPlayer === 'P1' ? 'プレイヤー1（赤）' : 'プレイヤー2（青）';
statusEl.textContent = `${name} の番です`;
statusEl.style.color = currentPlayer === 'P1' ? '#ef4444' : '#3b82f6';
}

function getValidMoves(fromNodeId) {
const valid = [];
edges.forEach(([u, v]) => {
let neighbor = -1;
if (u === fromNodeId) neighbor = v;
if (v === fromNodeId) neighbor = u;
if (neighbor !== -1 && !pieces[neighbor]) {
valid.push(neighbor);
}
});
return valid;
}

function draw() {
ctx.clearRect(0, 0, canvas.width, canvas.height);

// 線を描画
ctx.strokeStyle = '#4b5563';
ctx.lineWidth = 5;
ctx.lineCap = 'round';
edges.forEach(([u, v]) => {
ctx.beginPath();
ctx.moveTo(nodes[u].x, nodes[u].y);
ctx.lineTo(nodes[v].x, nodes[v].y);
ctx.stroke();
});

// 移動可能箇所の強調
if (selectedNode !== null) {
const validMoves = getValidMoves(selectedNode);
validMoves.forEach(targetId => {
ctx.beginPath();
ctx.arc(nodes[targetId].x, nodes[targetId].y, 22, 0, Math.PI * 2);
ctx.fillStyle = 'rgba(74, 222, 128, 0.4)';
ctx.fill();
});
}

// 丸ポチとコマを描画
nodes.forEach(node => {
ctx.beginPath();
ctx.arc(node.x, node.y, 11, 0, Math.PI * 2);
// スタート/ゴールマス（左3つと右3つ）は黄色
const isGoalZone = (node.id === 0 || node.id === 1 || node.id === 2 || node.id === 7 || node.id === 8 || node.id === 9);
ctx.fillStyle = isGoalZone ? '#f59e0b' : '#9ca3af';
ctx.fill();

if (selectedNode === node.id) {
ctx.beginPath();
ctx.arc(node.x, node.y, 20, 0, Math.PI * 2);
ctx.strokeStyle = '#facc15';
ctx.lineWidth = 3;
ctx.stroke();
}

const owner = pieces[node.id];
if (owner) {
ctx.beginPath();
ctx.arc(node.x, node.y, 15, 0, Math.PI * 2);
ctx.fillStyle = owner === 'P1' ? '#ef4444' : '#3b82f6';
ctx.fill();
ctx.strokeStyle = '#fff';
ctx.lineWidth = 2;
ctx.stroke();
}
});
}

function handlePointer(clientX, clientY) {
if (gameOver) return;

const rect = canvas.getBoundingClientRect();
const scaleX = canvas.width / rect.width;
const scaleY = canvas.height / rect.height;

const canvasX = (clientX - rect.left) * scaleX;
const canvasY = (clientY - rect.top) * scaleY;

const clickedNode = nodes.find(n => {
const dist = Math.hypot(n.x - canvasX, n.y - canvasY);
return dist < 30;
});

if (!clickedNode) return;
const id = clickedNode.id;

if (pieces[id] === currentPlayer) {
selectedNode = id;
}
else if (selectedNode !== null) {
const validMoves = getValidMoves(selectedNode);
if (validMoves.includes(id)) {
pieces[id] = currentPlayer;
delete pieces[selectedNode];
selectedNode = null;

if (checkWin(currentPlayer)) {
gameOver = true;
statusEl.textContent = `🎉 ${currentPlayer === 'P1' ? 'プレイヤー1（赤）' : 'プレイヤー2（青）'} の勝利です！`;
draw();
return;
}

currentPlayer = currentPlayer === 'P1' ? 'P2' : 'P1';
updateStatus();
}
}
draw();
}

canvas.addEventListener('click', (e) => {
handlePointer(e.clientX, e.clientY);
});

canvas.addEventListener('touchstart', (e) => {
e.preventDefault();
const touch = e.touches[0];
handlePointer(touch.clientX, touch.clientY);
}, { passive: false });

// 勝利判定
function checkWin(player) {
if (player === 'P1') {
// 赤（P1）が右側の3点（8, 7, 9）をすべて占領したら勝ち
return pieces[8] === 'P1' && pieces[7] === 'P1' && pieces[9] === 'P1';
} else {
// 青（P2）が左側の3点（0, 1, 2）をすべて占領したら勝ち
return pieces[0] === 'P2' && pieces[1] === 'P2' && pieces[2] === 'P2';
}
}

function resetGame() {
initGame();
}

initGame();
</script>
</body>
</html>
